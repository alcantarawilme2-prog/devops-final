name: CI/CD DevOps Final

on:
  push:
    branches:
      - main

jobs:

  test:
    name: Instalar dependencias y ejecutar pruebas
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas unitarias
        run: pytest test_app.py

  build-and-push:
    name: Build y Push a Docker Hub
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-final:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-final:${{ github.sha }}

  deploy:
    name: Deploy a Render.com
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Trigger deploy en Render
        run: |
          curl --request POST \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_FINAL }}/deploys" \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header "Content-Type: application/json" \
            --data '{"clearCache":"do_not_clear"}'